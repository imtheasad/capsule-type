<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capsule Type</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-modal" class="modal-overlay active">
        <div class="result-card">
            <div class="capsule-logo" style="margin: 0 auto 20px; width: 60px; height: 24px;"></div>
            <h2 id="auth-title" style="margin-bottom: 20px;">Create Account</h2>
            
            <div class="button-group" style="margin-bottom: 20px;">
                <button class="btn btn-custom" id="tab-signup" onclick="switchAuthTab('signup')" style="background: var(--btn-hover); border-color: var(--primary-accent);">Sign Up</button>
                <button class="btn btn-custom" id="tab-login" onclick="switchAuthTab('login')">Log In</button>
            </div>

            <input type="text" id="auth-username" placeholder="Username" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(150,150,150,0.3); margin-bottom: 10px; font-family: 'Inter'; font-size: 1rem; background: var(--bg-color); color: var(--text-main);">
            <input type="password" id="auth-password" placeholder="Password" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(150,150,150,0.3); margin-bottom: 15px; font-family: 'Inter'; font-size: 1rem; background: var(--bg-color); color: var(--text-main);">
            
            <p id="auth-error" style="color: var(--text-wrong); font-size: 0.85rem; margin-bottom: 15px; display: none;">Error message here</p>

            <button class="btn btn-custom" style="width: 100%;" id="auth-action-btn" onclick="handleAuth()">Sign Up</button>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal-overlay">
        <div class="result-card" style="padding: 30px; width: 100%; max-width: 400px;">
            <h2 style="margin-bottom: 20px;">🏆 Global Top 10</h2>
            <div id="leaderboard-list"></div>
            <button class="btn btn-custom" style="width: 100%; margin-top: 20px;" onclick="closeLeaderboard()">Close</button>
        </div>
    </div>

    <div id="roller-modal" class="modal-overlay">
        <div class="result-card" style="padding: 30px;">
            <h3 style="margin-bottom: 10px;">Custom Time</h3>
            <div style="position: relative;">
                <div class="roller-selector"></div>
                <div class="roller-window" id="time-roller">
                    <div class="roller-pad"></div>
                    <div class="roller-pad"></div>
                </div>
            </div>
            <button class="btn btn-custom" style="width: 100%;" onclick="confirmCustomTime()">Set Time</button>
        </div>
    </div>

    <div id="app-container">
        
        <header>
            <div class="brand">
                <div class="capsule-logo"></div>
                <h2>Capsule Type</h2>
            </div>
            <div class="user-controls">
                <span id="user-greeting" style="color: var(--text-faded); font-weight: 500; font-size: 0.9rem;"></span>
                <button class="btn btn-icon" id="leaderboard-btn" onclick="openLeaderboard()" title="Leaderboard">🏆</button>
                <button class="btn btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
                <button class="btn btn-icon" id="logout-btn" onclick="logoutUser()" title="Log Out" style="display: none; font-size: 0.9rem; padding: 8px;">Log Out</button>
            </div>
        </header>

        <div id="landing-screen" class="screen active">
            <div class="stats-row" style="justify-content: center; gap: 40px; margin-bottom: 50px;">
                <div style="text-align: center; font-size: 0.9rem;">Personal Best<br><span id="pb-wpm" class="stat-value" style="font-size: 2rem;">0</span> WPM</div>
            </div>

            <div class="button-group" id="initial-time-buttons">
                <button class="btn" onclick="handleTimeClick(30, '30 seconds')">30 seconds</button>
                <button class="btn" onclick="handleTimeClick(60, '1 minute')">1 minute</button>
                <button class="btn" onclick="handleTimeClick(120, '2 minutes')">2 minutes</button>
                <button class="btn btn-custom" onclick="openRoller()">Custom</button>
            </div>

            <div id="expanded-setup">
                <button class="btn btn-custom" id="selected-time-badge" style="font-weight: 600;">30s</button>
                <div class="pop-out-menu">
                    <button class="btn" onclick="startSetup('easy')">Easy</button>
                    <button class="btn" onclick="startSetup('normal')">Normal</button>
                    <button class="btn" onclick="startSetup('hard')">Hard</button>
                </div>
                <div class="side-options" id="other-times-container"></div>
            </div>
        </div>

        <div id="test-screen" class="screen">
            <div class="stats-row">
                <div>Time: <span id="time-display" class="stat-value">60</span>s</div>
                <div>WPM: <span id="wpm-display" class="stat-value">0</span></div>
                <div>Acc: <span id="acc-display" class="stat-value">100</span>%</div>
            </div>
            <div class="typing-box">
                <div id="caret"></div>
                <div id="text-display"></div>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="result-card" style="margin: 0 auto;">
                <h3 id="new-hs-badge" style="color: #2ecc71; display: none; margin-bottom: 10px;">🎉 Global Score Updated!</h3>
                <div class="big-stat" id="final-wpm">0</div>
                <div class="stat-label">WPM</div>
                <div class="result-stats-row">
                    <div>
                        <div style="font-size: 2rem; font-weight: 500;" id="final-acc">0%</div>
                        <div style="color: var(--text-faded); font-size: 0.9rem;">Accuracy</div>
                    </div>
                    <div>
                        <div style="font-size: 2rem; font-weight: 500;" id="final-time">0s</div>
                        <div style="color: var(--text-faded); font-size: 0.9rem;">Time</div>
                    </div>
                </div>
                <div class="button-group" style="justify-content: center; margin-bottom: 0;">
                    <button class="btn" onclick="resetApp()">Back to Home</button>
                    <button class="btn btn-custom" onclick="restartSameSettings()">Restart</button>
                </div>
            </div>
        </div>

        <footer>&copy; 2026 Capsule Type. All rights reserved.</footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
